<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}CVForge - ATS Resume Builder{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --green: #00d084;
  --green-dark: #00a86b;
  --green-glow: rgba(0,208,132,0.3);
  --purple: #7c3aed;
  --purple-light: #a78bfa;
  --purple-glow: rgba(124,58,237,0.3);
  --bg: #06090f;
  --bg2: #0a0f18;
  --bg3: #0e1424;
  --card: rgba(10,16,32,0.85);
  --border: rgba(0,208,132,0.12);
  --text: #e4e8f0;
  --text2: #94a3b8;
  --muted: #64748b;
  --white: #ffffff;
  --gradient: linear-gradient(135deg, var(--green), var(--purple));
  --font-main: 'Space Grotesk', sans-serif;
  --font-display: 'Syne', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 16px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-main);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── ANIMATED BACKGROUND ──────────────────────────────── */
.bg-canvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  overflow: hidden;
}

.bg-gradient {
  position: fixed; inset: 0;
  background: 
    radial-gradient(ellipse 80% 50% at 20% -20%, rgba(0,208,132,0.08), transparent),
    radial-gradient(ellipse 60% 40% at 80% 120%, rgba(124,58,237,0.08), transparent),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(0,208,132,0.03), transparent);
  z-index: 0;
}

.bg-grid {
  position: fixed; inset: 0;
  background-image: 
    linear-gradient(rgba(0,208,132,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,208,132,0.02) 1px, transparent 1px);
  background-size: 50px 50px;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black, transparent);
  -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black, transparent);
  z-index: 0;
}

.floating-shapes {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  overflow: hidden;
}

.floating-shapes::before, .floating-shapes::after {
  content: ''; position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  animation: float 20s ease-in-out infinite;
}

.floating-shapes::before {
  width: 400px; height: 400px;
  background: rgba(0,208,132,0.1);
  top: -100px; right: -100px;
  animation-delay: 0s;
}

.floating-shapes::after {
  width: 500px; height: 500px;
  background: rgba(124,58,237,0.08);
  bottom: -150px; left: -150px;
  animation-delay: -10s;
}

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(30px, -40px) scale(1.05); }
  66% { transform: translate(-20px, 20px) scale(0.95); }
}

/* ─── NAVBAR ────────────────────────────────────────────── */
.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  backdrop-filter: blur(20px);
  background: rgba(6,9,15,0.85);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex; align-items: center; gap: 24px;
  height: 64px;
  animation: slideDown 0.6s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-100%); }
  to { opacity: 1; transform: translateY(0); }
}

.nav-brand {
  font-family: var(--font-display);
  font-size: 1.4rem; font-weight: 800;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-decoration: none;
  letter-spacing: -0.5px;
}

.nav-brand span {
  font-weight: 300;
  opacity: 0.7;
}

.nav-links { display: flex; gap: 6px; margin-left: auto; }

.nav-link {
  padding: 8px 16px; border-radius: 8px;
  text-decoration: none; color: var(--text2);
  font-size: 0.875rem; font-weight: 500;
  transition: all 0.25s;
}

.nav-link:hover {
  color: var(--green);
  background: rgba(0,208,132,0.08);
}

.nav-link.active {
  color: var(--green);
  background: rgba(0,208,132,0.12);
}

.nav-cta {
  padding: 8px 18px;
  background: var(--gradient);
  color: white;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.25s;
}

.nav-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px var(--green-glow);
}

/* ─── BUTTONS ───────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 24px; border-radius: 12px;
  font-family: var(--font-main); font-size: 0.9rem; font-weight: 600;
  cursor: pointer; border: none; text-decoration: none;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative; overflow: hidden;
}

.btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  transform: translateX(-100%);
  transition: transform 0.6s;
}

.btn:hover::before { transform: translateX(100%); }

.btn-primary {
  background: var(--gradient);
  color: white;
  box-shadow: 0 4px 20px var(--green-glow);
}

.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--green-glow); }

.btn-outline {
  background: transparent;
  color: var(--green);
  border: 1px solid rgba(0,208,132,0.4);
}

.btn-outline:hover { background: rgba(0,208,132,0.08); border-color: var(--green); }

.btn-ghost {
  background: rgba(255,255,255,0.05);
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.1);
}

.btn-ghost:hover { background: rgba(255,255,255,0.1); }

.btn-purple {
  background: linear-gradient(135deg, var(--purple), var(--purple-light));
  color: white;
  box-shadow: 0 4px 20px var(--purple-glow);
}

.btn-sm { padding: 8px 14px; font-size: 0.8rem; }
.btn-lg { padding: 16px 32px; font-size: 1.1rem; }

/* ─── CARDS ─────────────────────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  backdrop-filter: blur(12px);
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-glow {
  box-shadow: 0 0 0 1px rgba(0,208,132,0.1), var(--shadow);
  transition: all 0.3s;
}

.card-glow:hover {
  box-shadow: 0 0 0 1px rgba(0,208,132,0.25), 0 12px 40px rgba(0,208,132,0.1);
}

/* ─── FORM ELEMENTS ─────────────────────────────────────── */
.form-group { margin-bottom: 20px; }

.form-label {
  display: block; font-size: 0.8rem; font-weight: 600;
  color: var(--green); margin-bottom: 8px;
  text-transform: uppercase; letter-spacing: 0.05em;
}

.form-control {
  width: 100%; padding: 12px 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px; color: var(--text);
  font-family: var(--font-main); font-size: 0.9rem;
  transition: all 0.2s; outline: none;
}

.form-control:focus {
  border-color: var(--green);
  background: rgba(0,208,132,0.05);
  box-shadow: 0 0 0 3px var(--green-glow);
}

textarea.form-control { resize: vertical; min-height: 100px; }

/* ─── SECTION HEADER ────────────────────────────────────── */
.section-title {
  font-family: var(--font-display);
  font-size: 1.1rem; font-weight: 700;
  color: var(--white);
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 20px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.section-title .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  flex-shrink: 0;
}

/* ─── BADGE ─────────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center;
  padding: 4px 12px; border-radius: 20px;
  font-size: 0.75rem; font-weight: 600;
}

.badge-green { background: rgba(0,208,132,0.15); color: var(--green); }
.badge-purple { background: rgba(124,58,237,0.15); color: var(--purple-light); }
.badge-orange { background: rgba(251,146,60,0.15); color: #fb923c; }

/* ─── TOAST ─────────────────────────────────────────────── */
.toast-container {
  position: fixed; bottom: 24px; right: 24px;
  z-index: 9999; display: flex; flex-direction: column; gap: 8px;
}

.toast {
  padding: 14px 20px; border-radius: 12px;
  font-size: 0.9rem; font-weight: 500;
  display: flex; align-items: center; gap: 10px;
  animation: toastIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(12px);
  max-width: 340px;
}

@keyframes toastIn {
  from { transform: translateX(100px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.toast-success {
  background: rgba(0,208,132,0.15);
  border: 1px solid rgba(0,208,132,0.3);
  color: var(--green);
}

.toast-error {
  background: rgba(239,68,68,0.15);
  border: 1px solid rgba(239,68,68,0.3);
  color: #ef4444;
}

/* ─── LOADING ───────────────────────────────────────────── */
.spinner {
  width: 20px; height: 20px;
  border: 2px solid rgba(0,208,132,0.3);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ─── PROGRESS BAR ──────────────────────────────────────── */
.progress { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.08); overflow: hidden; }
.progress-bar {
  height: 100%; border-radius: 3px;
  background: var(--gradient);
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ─── GRID ──────────────────────────────────────────────── */
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

@media (max-width: 768px) {
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .navbar { padding: 0 16px; }
  .nav-links { display: none; }
}

/* ─── SCROLLBAR ─────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: rgba(0,208,132,0.3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--green); }

/* ─── PAGE WRAP ─────────────────────────────────────────── */
.page-wrap {
  position: relative; z-index: 1;
  min-height: 100vh;
  padding-top: 64px;
}

/* ─── HERO SECTION ─────────────────────────────────────── */
.hero {
  text-align: center;
  padding: 80px 20px 60px;
  animation: fadeIn 0.8s ease;
}

.hero-title {
  font-family: var(--font-display);
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 800;
  letter-spacing: -2px;
  line-height: 1.1;
  margin-bottom: 16px;
}

.hero-title .gradient {
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: 1.1rem;
  color: var(--text2);
  max-width: 600px;
  margin: 0 auto 32px;
  line-height: 1.6;
}

/* ─── STATS ─────────────────────────────────────────────── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin: 40px 0;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
}

.stat-num {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 800;
  color: var(--green);
}

.stat-label {
  font-size: 0.85rem;
  color: var(--muted);
  margin-top: 4px;
}

/* ─── FEATURES ─────────────────────────────────────────────── */
.features-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin: 40px 0;
}

.feature-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  transition: all 0.3s;
}

.feature-card:hover {
  border-color: rgba(0,208,132,0.3);
  transform: translateY(-4px);
}

.feature-icon {
  width: 48px; height: 48px;
  border-radius: 12px;
  background: rgba(0,208,132,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  margin-bottom: 16px;
}

.feature-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 8px;
}

.feature-desc {
  font-size: 0.9rem;
  color: var(--text2);
  line-height: 1.5;
}
</style>
{% block extra_head %}{% endblock %}
</head>
<body>

<!-- Animated Background -->
<div class="bg-gradient"></div>
<div class="bg-grid"></div>
<div class="floating-shapes"></div>

<!-- Navbar -->
<nav class="navbar">
  <a href="/" class="nav-brand">⚡ <span>CVForge</span></a>
  
  <div class="nav-links">
    <a href="/" class="nav-link {% block nav_home %}{% endblock %}">Home</a>
    <a href="/builder/" class="nav-link {% block nav_builder %}{% endblock %}">Builder</a>
    <a href="/ats/" class="nav-link {% block nav_ats %}{% endblock %}">ATS Checker</a>
  </div>
  
  <div>
    {% if user.is_authenticated %}
      <a href="/builder/" class="nav-cta">+ New CV</a>
      <a href="/signout/" class="nav-link">Sign Out</a>
    {% else %}
      <a href="/auth/" class="nav-cta">Get Started</a>
    {% endif %}
  </div>
</nav>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<div class="page-wrap">
  {% block content %}{% endblock %}
</div>

<script>
function showToast(msg, type='success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = `<span>${type==='success'?'✅':'❌'}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
