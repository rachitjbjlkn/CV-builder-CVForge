{% load i18n %}
<div class="app-item">
    <h2>{% trans app.name %}</h2>
    <table>
        {% for model in app.models %}
        <tr>
            <td>
                {% if model.admin_url %}
                    <a href="{{ model.admin_url }}"><i class="fas fa-{% block model_icon %}{% if 'user' in model.object_name|lower %}user{% elif 'profile' in model.object_name|lower %}user-circle{% elif 'cv' in model.object_name|lower %}file-alt{% elif 'ats' in model.object_name|lower %}chart-line{% else %}database{% endif %}{% endblock %}"></i> {{ model.name }}</a>
                {% else %}
                    {{ model.name }}
                {% endif %}
                {% if model.add_url %}<a href="{{ model.add_url }}" class="addlink"><i class="fas fa-plus"></i></a>{% endif %}
            </td>
        </tr>
        {% endfor %}
    </table>
</div>
