{% load i18n static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}{% endblock %} | CVForge Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root { --primary: #00d084; --secondary: #7c3aed; --dark: #0f172a; --light: #f8fafc; --white: #fff; --gray: #64748b; --border: #e2e8f0; --gradient: linear-gradient(135deg, #00d084, #7c3aed); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; font-size: 14px; }
a { color: var(--primary); text-decoration: none; }
a:hover { text-decoration: underline; }

.login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
.login-box { background: white; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); width: 100%; max-width: 400px; }
.login-header { background: var(--gradient); padding: 32px; text-align: center; }
.login-header h1 { color: white; font-size: 1.5rem; font-weight: 800; margin: 0; }
.login-header p { color: rgba(255,255,255,0.8); font-size: 0.875rem; margin-top: 4px; }
.login-form { padding: 32px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-weight: 500; margin-bottom: 8px; }
.form-group input { width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px; }
.form-group input:focus { outline: none; border-color: var(--primary); }
.submit-row button { width: 100%; padding: 14px; background: var(--gradient); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }

#header { background: #0f172a; color: white; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
#header a { color: white; }
.brand { font-size: 1.25rem; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
#user-tools { display: flex; align-items: center; gap: 16px; font-size: 0.875rem; }

#container { display: flex; min-height: calc(100vh - 56px); }
#content-main { flex: 1; padding: 24px; }

.app-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
.app-item { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow: hidden; }
.app-item h2 { background: var(--gradient); color: white; padding: 16px 20px; font-size: 1rem; margin: 0; }
.app-item table { width: 100%; }
.app-item td { padding: 12px 20px; border-bottom: 1px solid var(--border); }
.app-item td a { display: flex; align-items: center; gap: 10px; color: #1e293b; font-weight: 500; }
.app-item td a:hover { color: var(--primary); }

table { width: 100%; background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
thead { background: #0f172a; color: white; }
thead th { padding: 14px 16px; text-align: left; font-weight: 600; }
tbody tr { border-bottom: 1px solid var(--border); }
tbody tr:hover { background: #f8fafc; }
tbody td { padding: 14px 16px; }

.button, input[type="submit"] { background: var(--gradient); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
.form-row { padding: 16px 0; border-bottom: 1px solid var(--border); }
input, select, textarea { border: 2px solid var(--border); border-radius: 8px; padding: 10px; }

.paginator { background: white; padding: 16px; border-radius: 12px; display: flex; gap: 8px; }
.paginator a { padding: 8px 12px; border-radius: 6px; font-weight: 500; }

#changelist-filter { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 16px; }
#changelist-filter h3 { margin: 0 0 12px 0; font-size: 1rem; }
#changelist-filter ul { list-style: none; padding: 0; }
#changelist-filter li { margin: 4px 0; }
#changelist-filter li a { padding: 8px 12px; display: block; border-radius: 6px; color: var(--gray); }
#changelist-filter li a:hover { background: var(--light); color: var(--primary); }
</style>
{% block extrahead %}{% endblock %}
</head>
{% block body %}{% endblock %}
</html>
